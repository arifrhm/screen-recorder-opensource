version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: screen-recorder-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  swift:
    image: morrisjobke/docker-swift-only
    container_name: screen-recorder-swift
    ports:
      - "8080:8080"
    environment:
      - SWIFT_DEFAULT_KEY=devstack
    volumes:
      - swift-data:/srv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Optional: Redis Commander for web UI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: screen-recorder-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  redis-data:
    driver: local
  swift-data:
    driver: local

networks:
  default:
    name: screen-recorder-network
